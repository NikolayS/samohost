name: Secret Scan

# Runs on every PR and every push to main.
# Fails the check if gitleaks detects a secret in the diff (PR) or full
# history (push to main).  The job is intentionally separate from ci.yml so
# it can be required as its own branch-protection rule and gives a distinct
# status name for the merge gate.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # Full history so gitleaks can scan every commit reachable from HEAD,
      # not just the tip.  On a PR this gives gitleaks the base..head range.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is required by the action to post inline annotations
          # when secrets are found.  No GITLEAKS_LICENSE needed for public repos
          # on personal accounts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
