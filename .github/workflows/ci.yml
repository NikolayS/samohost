name: CI
on:
  pull_request:
  push:
    branches: [main, feat/scaffold-v0]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Install Caddy v2.11.4 — pinned to match the fleet (caddy-adapt equality rig)
      - name: Install Caddy v2.11.4
        run: |
          curl -fsSL \
            "https://github.com/caddyserver/caddy/releases/download/v2.11.4/caddy_2.11.4_linux_amd64.tar.gz" \
            -o caddy.tar.gz
          tar -xzf caddy.tar.gz caddy
          sudo mv caddy /usr/local/bin/caddy
          caddy version
      - run: bunx tsc --noEmit
      - run: bun test
        env:
          # Hard-fail if caddy binary is missing in CI — a skip must never
          # silently green the caddy-adapt tests in CI.
          SAMOHOST_REQUIRE_CADDY: "1"
