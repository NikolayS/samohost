name: CI
on:
  pull_request:
  push:
    branches: [main, feat/scaffold-v0]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: authtest
          POSTGRES_PASSWORD: authtest
          POSTGRES_DB: authtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Install Caddy v2.11.4 — pinned to match the fleet (caddy-adapt equality rig)
      - name: Install Caddy v2.11.4
        run: |
          curl -fsSL \
            "https://github.com/caddyserver/caddy/releases/download/v2.11.4/caddy_2.11.4_linux_amd64.tar.gz" \
            -o caddy.tar.gz
          tar -xzf caddy.tar.gz caddy
          sudo mv caddy /usr/local/bin/caddy
          caddy version
      - run: bunx tsc --noEmit
      - run: bun test
        env:
          # DO NOT REMOVE — without this flag every caddy-a* (adapt equality)
          # test is silently skipped via test.skipIf(!hasCaddy), turning the
          # whole rig green with zero adapt validation. Hard-fail here ensures
          # the caddy install step above is never silently bypassed.
          SAMOHOST_REQUIRE_CADDY: "1"
      # @samo/auth package — typecheck + unit tests (SQLite) + real-Postgres integration tests
      - name: Install @samo/auth deps
        run: cd packages/auth && bun install --frozen-lockfile
      - name: Typecheck @samo/auth
        run: cd packages/auth && bunx tsc --noEmit
      - name: Test @samo/auth (SQLite unit tests)
        run: cd packages/auth && bun test test/auth.test.ts
      - name: Test @samo/auth (real-Postgres integration tests)
        run: cd packages/auth && bun test test/pg.test.ts
        env:
          # Real Postgres service container — pg.test.ts FAILS FAST if this is unset.
          # DO NOT REMOVE — the tests throw (not skip) on missing PG_TEST_URL so CI
          # catches any misconfigured workflow immediately.
          PG_TEST_URL: postgres://authtest:authtest@localhost:5432/authtest
