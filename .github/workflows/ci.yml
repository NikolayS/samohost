name: CI
on:
  pull_request:
  push:
    branches: [main, feat/scaffold-v0]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test
